<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Emerald Cup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#132A22;
    --green-mid:#1F4436;
    --cream:#F3EAD6;
    --gold:#C7973F;
    --rust:#A8531B;
    --ink:#182420;
    --line: rgba(19,42,34,0.16);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(19,42,34,0.06) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 20px 80px;}

  /* ---- Header ---- */
  header{
    background:var(--green-deep);
    color:var(--cream);
    padding:44px 20px 34px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0; height:6px;
    background:repeating-linear-gradient(90deg, var(--gold) 0 18px, var(--rust) 18px 22px, transparent 22px 40px);
    opacity:0.9;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:12px;
    color:var(--gold);
    margin-bottom:10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:clamp(34px,6vw,54px);
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .knot{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-top:14px; color:var(--gold); opacity:.85;
  }
  .knot svg{width:120px;height:14px;}
  .sub{
    font-size:15px; color:rgba(243,234,214,0.72); max-width:480px; margin:14px auto 0;
    font-family:'Inter',sans-serif;
  }

  /* ---- Tabs ---- */
  nav.tabs{
    display:flex; overflow-x:auto; gap:6px; margin:26px 0 22px;
    padding-bottom:4px; -webkit-overflow-scrolling:touch;
  }
  nav.tabs button{
    flex:0 0 auto;
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    letter-spacing:.03em;
    padding:9px 16px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.5);
    color:var(--green-deep);
    border-radius:3px;
    cursor:pointer;
  }
  nav.tabs button.active{
    background:var(--green-deep);
    color:var(--cream);
    border-color:var(--green-deep);
  }

  /* ---- Cards / scorecard panels ---- */
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:4px;
    padding:22px;
    margin-bottom:18px;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; bottom:0; width:4px;
    background:var(--gold);
  }
  .card h2{
    font-family:'Fraunces',serif;
    font-size:20px;
    margin:0 0 4px;
    color:var(--green-deep);
  }
  .card .desc{ font-size:13px; color:#5b6b62; margin-bottom:16px; }

  table{width:100%; border-collapse:collapse; font-family:'IBM Plex Mono',monospace; font-size:13.5px;}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:#6b7d72; padding:6px 8px; border-bottom:1px solid var(--line);
    font-weight:600;
  }
  td{padding:7px 8px; border-bottom:1px solid rgba(19,42,34,0.07); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  input[type=number], input[type=text]{
    width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:3px;
    font-family:'IBM Plex Mono',monospace; font-size:13.5px; background:#FCFAF4;
  }
  input[type=number]{max-width:80px;}
  .row-name{font-family:'Inter',sans-serif; font-weight:500;}
  .rank{color:var(--gold); font-weight:700; width:26px;}
  .lead{ font-weight:700; color:var(--green-mid); }

  .team-block{
    display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:14px;
  }
  @media(max-width:560px){ .team-block{grid-template-columns:1fr;} }
  .team{
    border:1px solid var(--line); border-radius:4px; padding:12px 14px; background:#FCFAF4;
  }
  .team h3{
    font-family:'Fraunces',serif; font-size:15px; margin:0 0 6px; color:var(--green-deep);
  }
  .team ul{margin:0 0 10px; padding-left:18px; font-size:13px; color:#3c4a42;}
  .team .score-row{display:flex; align-items:center; gap:8px; font-size:12px; color:#5b6b62;}
  .winner-badge{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px;
    background:var(--gold); color:var(--green-deep); padding:2px 8px; border-radius:10px;
    margin-left:8px; letter-spacing:.03em;
  }

  .settings-row{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;}
  .settings-row label{font-size:13px; color:#3c4a42; min-width:170px;}
  .pill{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#6b7d72;
    background:rgba(199,151,63,0.14); padding:2px 8px; border-radius:10px; margin-left:6px;
  }
  .save-note{font-size:11.5px; color:#8a9a90; font-family:'IBM Plex Mono',monospace; margin-top:10px;}
  .btn{
    font-family:'IBM Plex Mono',monospace; font-size:12.5px; letter-spacing:.03em;
    background:var(--green-deep); color:var(--cream); border:none; padding:8px 14px;
    border-radius:3px; cursor:pointer;
  }
  .btn.ghost{ background:transparent; color:var(--rust); border:1px solid var(--rust); }
  .payout-line{display:flex; justify-content:space-between; font-size:13px; padding:4px 0; color:#3c4a42;}
  .payout-line b{color:var(--green-deep);}

  .mode-toggle{
    display:flex; align-items:center; gap:8px; font-size:13px; color:#3c4a42;
    margin-bottom:16px; font-family:'IBM Plex Mono',monospace;
  }
  .scroll-x{overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px;}
  table.scorecard{border-collapse:collapse; font-family:'IBM Plex Mono',monospace; font-size:12.5px; min-width:820px;}
  table.scorecard th, table.scorecard td{
    padding:5px 4px; text-align:center; border-bottom:1px solid rgba(19,42,34,0.07); border-right:1px solid rgba(19,42,34,0.05);
  }
  table.scorecard th{ font-size:10.5px; color:#6b7d72; text-transform:uppercase; letter-spacing:.03em; font-weight:600;}
  table.scorecard input{width:38px; padding:4px 2px; text-align:center; border:1px solid var(--line); border-radius:2px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; background:#FCFAF4;}
  table.scorecard td.name-col, table.scorecard th.name-col{ text-align:left; min-width:118px; font-family:'Inter',sans-serif; font-weight:500; position:sticky; left:0; background:#fff; }
  table.scorecard .summary-col{font-weight:600; color:var(--green-deep);}
  .hcp-input{width:52px !important;}
  .skins-summary{font-size:13px; color:#3c4a42; margin-top:10px; line-height:1.7;}
  .skins-summary b{color:var(--green-deep);}
  .hint{font-size:12px; color:#8a9a90; margin:4px 0 14px;}
  .jump-btn{
    background:none; border:none; padding:0; margin:0; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:500; font-size:inherit; color:var(--ink);
    text-align:left;
  }
  .jump-btn:hover{ color:var(--rust); text-decoration:underline; }
</style>
</head>
<body>
<header>
  <div class="eyebrow">Seven Rounds &middot; One Cup</div>
  <h1>The Emerald Cup</h1>
  <div class="sub">Weekly Stableford, daily skins &amp; daily best ball — tallied round by round.</div>
  <div class="knot" aria-hidden="true">
    <svg viewBox="0 0 120 14"><path d="M0 7 Q10 0 20 7 T40 7 T60 7 T80 7 T100 7 T120 7" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
  </div>
</header>

<div class="wrap">
  <nav class="tabs" id="tabs"></nav>
  <div id="content"></div>
</div>

<script>
const DEFAULT_PLAYERS = [
  {id:'you', name:'You'},
  {id:'mcf', name:'John McFadden'},
  {id:'bob', name:'Bob Mairone'},
  {id:'don', name:'Don Zabinski'},
  {id:'steve', name:'Steve Grimmie'},
  {id:'pete', name:'Pete Westhead'},
  {id:'sames', name:'John Sames'},
  {id:'brian', name:'Brian Leypoldt'},
];

const COURSE_LIBRARY = {
  oldhead: {
    label: "Old Head Golf Links (Kinsale)",
    par: [4,4,3,4,4,5,3,5,4,5,3,5,3,4,4,3,5,4],
    si:  [14,10,18,2,8,4,16,12,6,11,15,1,13,3,17,9,5,7],
  },
};

const DEFAULT_ROUNDS = [
  {A:['you','don','pete','mcf'], B:['steve','bob','sames','brian']},
  {A:['you','steve','bob','brian'], B:['don','pete','mcf','sames']},
  {A:['you','pete','sames','don'], B:['steve','bob','mcf','brian']},
  {A:['you','brian','mcf','bob'], B:['don','pete','steve','sames']},
  {A:['you','pete','steve','mcf'], B:['don','bob','sames','brian']},
  {A:['you','don','sames','brian'], B:['pete','bob','mcf','steve']},
];

function freshDay(round){
  return {
    mode: 'quick',
    stableford: {},
    skins: {},
    skinsPot: 50,
    bestBallPot: 100,
    higherWins: true,
    teamAScore: '',
    teamBScore: '',
    teamAName: 'Team A',
    teamBName: 'Team B',
    teamA: round.A.slice(),
    teamB: round.B.slice(),
    course: { name:'', par: Array(18).fill(4), si: Array.from({length:18},(_,i)=>i+1) },
    handicaps: {},
    holes: {},
  };
}

function holeStrokes(ch, si){
  ch = Number(ch)||0;
  const base = Math.floor(ch/18);
  const rem = ch - base*18;
  return base + (si<=rem ? 1 : 0);
}

function ensureScorecard(d, playerIds){
  if(!d.course) d.course = { name:'', par: Array(18).fill(4), si: Array.from({length:18},(_,i)=>i+1) };
  if(!d.handicaps) d.handicaps = {};
  if(!d.holes) d.holes = {};
  playerIds.forEach(pid=>{ if(!d.holes[pid]) d.holes[pid] = Array(18).fill(''); });
}

function computeScorecard(d, players){
  ensureScorecard(d, players.map(p=>p.id));
  const par = d.course.par.map(Number);
  const si = d.course.si.map(Number);
  const perPlayer = {};
  players.forEach(p=>{
    const gross = d.holes[p.id].map(v=> v===''||v===undefined||v===null ? null : Number(v));
    const ch = Number(d.handicaps[p.id])||0;
    const skinsCh = Math.ceil(ch*0.5); // skins use half course handicap, rounded up
    const net = gross.map((g,i)=> g===null ? null : g - holeStrokes(ch, si[i]));
    const netSkins = gross.map((g,i)=> g===null ? null : g - holeStrokes(skinsCh, si[i]));
    const pts = net.map((n,i)=> n===null ? null : Math.max(0, 2-(n-par[i])));
    perPlayer[p.id] = {
      gross, net, netSkins, pts,
      grossTotal: gross.reduce((s,v)=> s+(v||0),0),
      netTotal: net.reduce((s,v)=> s+(v||0),0),
      ptsTotal: pts.reduce((s,v)=> s+(v||0),0),
      holesEntered: gross.filter(v=>v!==null).length,
    };
  });
  const skinsWon = {}; players.forEach(p=> skinsWon[p.id]=0);
  const skinHoles = [];
  for(let h=0; h<18; h++){
    const entries = players.map(p=>({id:p.id, val: perPlayer[p.id].netSkins[h]})).filter(e=>e.val!==null);
    if(entries.length<2) continue;
    const minVal = Math.min(...entries.map(e=>e.val));
    const winners = entries.filter(e=>e.val===minVal);
    if(winners.length===1){ skinsWon[winners[0].id]++; skinHoles.push({hole:h+1, winner:winners[0].id}); }
  }
  return {perPlayer, skinsWon, skinHoles};
}

function bestBallNetTotal(teamIds, perPlayerCalc){
  // "2 best balls of 4": sum of the two lowest full-handicap net scores per hole.
  let total = 0, any=false;
  for(let h=0; h<18; h++){
    const vals = teamIds.map(pid=> perPlayerCalc[pid] ? perPlayerCalc[pid].net[h] : null)
      .filter(v=>v!==null && v!==undefined)
      .sort((a,b)=>a-b);
    if(vals.length===0) continue;
    any=true;
    const takeCount = Math.min(2, vals.length);
    for(let k=0;k<takeCount;k++){ total += vals[k]; }
  }
  return any ? total : null;
}

function defaultState(){
  const days = DEFAULT_ROUNDS.map(freshDay);
  // Day 1: today's round is Old Head — start it in full scorecard mode, pre-loaded.
  days[0].mode = 'scorecard';
  days[0].course.name = COURSE_LIBRARY.oldhead.label;
  days[0].course.par = COURSE_LIBRARY.oldhead.par.slice();
  days[0].course.si = COURSE_LIBRARY.oldhead.si.slice();
  return {
    players: DEFAULT_PLAYERS,
    days: days,
  };
}

let state = defaultState();
let activeTab = 'overall';
let dayTeamFilter = null; // null = all players, 'A' or 'B' = that team only

// Group-view support: a link like ?day=1&team=A opens straight to that
// foursome's scoring card, with nothing else to navigate or edit.
const urlParams = new URLSearchParams(window.location.search);
const groupViewDay = urlParams.has('day') ? Number(urlParams.get('day'))-1 : null;
const groupViewTeam = (urlParams.get('team')||'').toUpperCase();
const isGroupView = groupViewDay !== null && (groupViewTeam==='A' || groupViewTeam==='B') && !Number.isNaN(groupViewDay);
if(isGroupView){ activeTab = 'day'+groupViewDay; }

function groupLinkFor(dayIdx, team){
  const base = window.location.origin + window.location.pathname;
  return `${base}?day=${dayIdx+1}&team=${team}`;
}

// Paste the Web App URL from your Google Apps Script deployment here.
// Until you do, the page falls back to this browser's local storage only
// (so it'll work solo, but won't sync across the group).
const API_URL = 'https://script.google.com/macros/s/AKfycbykze79Pq-LnW0nQRWwk0_8FQaOLz_eMJBU5a8qXGkJHnv2PjCGUP5VJ_g05GmzP0i6/exec';
const LOCAL_KEY = 'emerald-cup-state-v1';

function apiConfigured(){
  return API_URL && API_URL.indexOf('PASTE_') !== 0;
}

async function loadState(){
  if(apiConfigured()){
    try{
      const res = await fetch(API_URL);
      const data = await res.json();
      if(data && data.value){
        state = Object.assign(defaultState(), JSON.parse(data.value));
      }
    }catch(e){
      console.log('Could not reach the Sheets backend, starting fresh.', e);
    }
  } else {
    try{
      const raw = localStorage.getItem(LOCAL_KEY);
      if(raw) state = Object.assign(defaultState(), JSON.parse(raw));
    }catch(e){ console.log('No local data yet.'); }
  }
  render();
}

let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    const note = document.getElementById('save-note');
    if(apiConfigured()){
      try{
        await fetch(API_URL, {
          method: 'POST',
          headers: {'Content-Type':'text/plain;charset=utf-8'},
          body: JSON.stringify({ value: JSON.stringify(state) })
        });
        if(note){ note.textContent = 'Synced to Sheets ' + new Date().toLocaleTimeString(); }
      }catch(e){
        console.error('Sync failed', e);
        if(note){ note.textContent = 'Sync failed — check your connection'; }
      }
    } else {
      try{
        localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
        if(note){ note.textContent = 'Saved locally ' + new Date().toLocaleTimeString() + ' (no Sheets URL set)'; }
      }catch(e){ console.error('Local save failed', e); }
    }
  }, 400);
}

function playerName(id){
  const p = state.players.find(p=>p.id===id);
  return p ? p.name : id;
}

function totalPoints(playerId){
  return state.days.reduce((sum,d)=> sum + (Number(d.stableford[playerId])||0), 0);
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  let html = `<button data-tab="overall" class="${activeTab==='overall'?'active':''}">Overall</button>`;
  state.days.forEach((_,i)=>{
    html += `<button data-tab="day${i}" class="${activeTab==='day'+i?'active':''}">Day ${i+1}</button>`;
  });
  html += `<button data-tab="settings" class="${activeTab==='settings'?'active':''}">Players</button>`;
  tabs.innerHTML = html;
  tabs.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{ activeTab = b.dataset.tab; dayTeamFilter = null; render(); });
  });
}

function renderOverall(){
  let skinsTotal = {}; let winnings = {}; let stablefordTotal = {};
  state.players.forEach(p=>{ skinsTotal[p.id]=0; winnings[p.id]=0; stablefordTotal[p.id]=0; });

  state.days.forEach(d=>{
    if(d.mode==='scorecard'){
      const {perPlayer, skinsWon} = computeScorecard(d, state.players);
      state.players.forEach(p=>{ stablefordTotal[p.id] += perPlayer[p.id].ptsTotal; });
      const totalSkins = Object.values(skinsWon).reduce((s,v)=>s+v,0);
      const perSkin = totalSkins>0 ? d.skinsPot/totalSkins : 0;
      state.players.forEach(p=>{ skinsTotal[p.id]+=skinsWon[p.id]; winnings[p.id]+=skinsWon[p.id]*perSkin; });
      const totalA = bestBallNetTotal(d.teamA, perPlayer);
      const totalB = bestBallNetTotal(d.teamB, perPlayer);
      if(totalA!==null && totalB!==null && totalA!==totalB){
        const winTeam = totalA<totalB ? d.teamA : d.teamB;
        const share = d.bestBallPot/winTeam.length;
        winTeam.forEach(pid=> winnings[pid]+=share);
      }
    } else {
      state.players.forEach(p=>{ stablefordTotal[p.id] += Number(d.stableford[p.id])||0; });
      const totalSkins = Object.values(d.skins).reduce((s,v)=>s+(Number(v)||0),0);
      const perSkin = totalSkins>0 ? d.skinsPot/totalSkins : 0;
      Object.entries(d.skins).forEach(([pid,count])=>{
        const c = Number(count)||0;
        skinsTotal[pid] += c;
        winnings[pid] += c*perSkin;
      });
      const a = Number(d.teamAScore), b = Number(d.teamBScore);
      if(d.teamAScore!=='' && d.teamBScore!==''){
        const aWins = d.higherWins ? a>b : a<b;
        const bWins = d.higherWins ? b>a : b<a;
        if(aWins){
          const share = d.bestBallPot / d.teamA.length;
          d.teamA.forEach(pid=> winnings[pid]+=share);
        } else if(bWins){
          const share = d.bestBallPot / d.teamB.length;
          d.teamB.forEach(pid=> winnings[pid]+=share);
        }
      }
    }
  });

  const ranked = state.players.map(p=>({...p, total: stablefordTotal[p.id]}))
    .sort((a,b)=> b.total - a.total);

  let rows = ranked.map((p,i)=>`
    <tr>
      <td class="rank">${i+1}</td>
      <td class="row-name ${i===0?'lead':''}">${p.name}</td>
      <td>${p.total}</td>
      <td>${skinsTotal[p.id]}</td>
      <td>$${winnings[p.id].toFixed(2)}</td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>Week-Long Stableford</h2>
      <div class="desc">Cumulative points across all rounds entered so far.</div>
      <table>
        <thead><tr><th></th><th>Player</th><th>Total pts</th><th>Skins won</th><th>Trip winnings</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderDay(idx){
  const d = state.days[idx];
  const modeToggle = `
    <div class="mode-toggle">
      <label><input type="checkbox" id="scorecardMode" ${d.mode==='scorecard'?'checked':''}> Full scorecard mode (handicaps + stroke index, no Squabbit needed)</label>
    </div>`;
  if(d.mode==='scorecard'){
    renderDayScorecard(idx, modeToggle);
    return;
  }
  let stableRows = state.players.map(p=>`
    <tr>
      <td class="row-name">${p.name}</td>
      <td><input type="number" data-kind="stableford" data-player="${p.id}" value="${d.stableford[p.id] ?? ''}" placeholder="pts"></td>
      <td><input type="number" min="0" data-kind="skins" data-player="${p.id}" value="${d.skins[p.id] ?? ''}" placeholder="0"></td>
    </tr>`).join('');

  const totalSkins = Object.values(d.skins).reduce((s,v)=>s+(Number(v)||0),0);
  const perSkin = totalSkins>0 ? (d.skinsPot/totalSkins).toFixed(2) : '0.00';

  const a = Number(d.teamAScore), b = Number(d.teamBScore);
  let aWin=false, bWin=false;
  if(d.teamAScore!=='' && d.teamBScore!==''){
    aWin = d.higherWins ? a>b : a<b;
    bWin = d.higherWins ? b>a : b<a;
  }
  const shareA = aWin ? (d.bestBallPot/d.teamA.length).toFixed(2) : null;
  const shareB = bWin ? (d.bestBallPot/d.teamB.length).toFixed(2) : null;

  document.getElementById('content').innerHTML = `
    ${modeToggle}
    <div class="card">
      <h2>Day ${idx+1} &middot; Stableford &amp; Skins</h2>
      <div class="desc">Enter each player's points and skins won this round.</div>
      <table>
        <thead><tr><th>Player</th><th>Stableford pts</th><th>Skins won</th></tr></thead>
        <tbody>${stableRows}</tbody>
      </table>
      <div class="settings-row" style="margin-top:14px;">
        <label>Skins pot ($)</label>
        <input type="number" id="skinsPot" value="${d.skinsPot}" style="max-width:100px;">
        <span class="pill">$${perSkin}/skin &middot; ${totalSkins} skins</span>
      </div>
    </div>

    <div class="card">
      <h2>Day ${idx+1} &middot; Team Best Ball</h2>
      <div class="desc">Teams pulled from the trip's foursome schedule — edit names/scores below.</div>
      <div class="team-block">
        <div class="team">
          <h3>${d.teamAName}${aWin?'<span class="winner-badge">Winner</span>':''}</h3>
          <ul>${d.teamA.map(pid=>`<li>${playerName(pid)}</li>`).join('')}</ul>
          <div class="score-row">Score <input type="number" id="scoreA" value="${d.teamAScore}" style="max-width:80px;"></div>
        </div>
        <div class="team">
          <h3>${d.teamBName}${bWin?'<span class="winner-badge">Winner</span>':''}</h3>
          <ul>${d.teamB.map(pid=>`<li>${playerName(pid)}</li>`).join('')}</ul>
          <div class="score-row">Score <input type="number" id="scoreB" value="${d.teamBScore}" style="max-width:80px;"></div>
        </div>
      </div>
      <div class="settings-row">
        <label>Best ball pot ($)</label>
        <input type="number" id="bbPot" value="${d.bestBallPot}" style="max-width:100px;">
        <label style="min-width:auto;"><input type="checkbox" id="higherWins" ${d.higherWins?'checked':''}> Higher score wins (Stableford)</label>
      </div>
      ${aWin ? `<div class="payout-line">Each ${d.teamAName} player collects <b>$${shareA}</b></div>` : ''}
      ${bWin ? `<div class="payout-line">Each ${d.teamBName} player collects <b>$${shareB}</b></div>` : ''}
    </div>
    <div class="save-note" id="save-note">All entries save automatically.</div>
  `;

  document.querySelectorAll('[data-kind="stableford"]').forEach(el=>{
    el.addEventListener('input', ()=>{ d.stableford[el.dataset.player]=el.value; saveState(); });
  });
  document.querySelectorAll('[data-kind="skins"]').forEach(el=>{
    el.addEventListener('change', ()=>{ d.skins[el.dataset.player]=el.value; saveState(); render(); });
  });
  document.getElementById('skinsPot').addEventListener('change', e=>{ d.skinsPot=Number(e.target.value)||0; saveState(); render(); });
  document.getElementById('bbPot').addEventListener('change', e=>{ d.bestBallPot=Number(e.target.value)||0; saveState(); render(); });
  document.getElementById('scoreA').addEventListener('change', e=>{ d.teamAScore=e.target.value; saveState(); render(); });
  document.getElementById('scoreB').addEventListener('change', e=>{ d.teamBScore=e.target.value; saveState(); render(); });
  document.getElementById('higherWins').addEventListener('change', e=>{ d.higherWins=e.target.checked; saveState(); render(); });
  document.getElementById('scorecardMode').addEventListener('change', e=>{ d.mode = e.target.checked ? 'scorecard':'quick'; saveState(); render(); });
}

function renderGroupView(idx, team){
  const d = state.days[idx];
  if(d.mode !== 'scorecard'){ d.mode = 'scorecard'; saveState(); }
  const teamIds = team==='A' ? d.teamA : d.teamB;
  const teamName = team==='A' ? d.teamAName : d.teamBName;
  const names = teamIds.map(playerName).join(', ');

  renderDayScorecard(idx, '', team);

  const banner = `
    <div class="card" style="border-left-color:var(--rust);">
      <h2>Day ${idx+1} &middot; ${teamName}</h2>
      <div class="desc">${names}. Enter your group's scores below — everything saves automatically for the whole trip.</div>
      <div style="font-size:12.5px;"><a href="${window.location.origin+window.location.pathname}" style="color:var(--rust);">Open the full trip tracker &rarr;</a></div>
    </div>
  `;
  document.getElementById('content').insertAdjacentHTML('afterbegin', banner);
}

function renderDayScorecard(idx, modeToggle, teamFilter){
  const d = state.days[idx];
  ensureScorecard(d, state.players.map(p=>p.id));
  const {perPlayer, skinsWon, skinHoles} = computeScorecard(d, state.players);
  const rowPlayers = activeFilter ? (activeFilter==='A'?d.teamA:d.teamB).map(pid=>state.players.find(p=>p.id===pid)) : state.players;

  const totalSkins = Object.values(skinsWon).reduce((s,v)=>s+v,0);
  const perSkin = totalSkins>0 ? (d.skinsPot/totalSkins).toFixed(2) : '0.00';

  const totalA = bestBallNetTotal(d.teamA, perPlayer);
  const totalB = bestBallNetTotal(d.teamB, perPlayer);
  const aWin = totalA!==null && totalB!==null && totalA<totalB;
  const bWin = totalA!==null && totalB!==null && totalB<totalA;
  const shareA = aWin ? (d.bestBallPot/d.teamA.length).toFixed(2) : null;
  const shareB = bWin ? (d.bestBallPot/d.teamB.length).toFixed(2) : null;

  const holeNums = Array.from({length:18},(_,i)=>i+1);

  function courseRow(label, key){
    return `<tr><th class="name-col">${label}</th>${holeNums.map(h=>`<td><input type="number" data-course="${key}" data-hole="${h-1}" value="${d.course[key][h-1]}"></td>`).join('')}</tr>`;
  }

  function playerRow(p){
    const calc = perPlayer[p.id];
    return `<tr>
      <td class="name-col"><button type="button" class="jump-btn" data-jump="${p.id}" title="Jump to ${p.name}'s first hole">${p.name}</button></td>
      ${holeNums.map(h=>`<td><input type="number" data-hole-score data-player="${p.id}" data-hole="${h-1}" value="${d.holes[p.id][h-1]}"></td>`).join('')}
      <td class="summary-col" id="gross-${p.id}">${calc.grossTotal}</td>
      <td class="summary-col" id="net-${p.id}">${calc.netTotal}</td>
      <td class="summary-col" id="pts-${p.id}">${calc.ptsTotal}</td>
    </tr>`;
  }

  const teamTabs = teamFilter ? '' : `
    <nav class="tabs" id="teamTabs" style="margin-top:0;">
      <button data-tf="" class="${!dayTeamFilter?'active':''}">All Players</button>
      <button data-tf="A" class="${dayTeamFilter==='A'?'active':''}">${d.teamAName}</button>
      <button data-tf="B" class="${dayTeamFilter==='B'?'active':''}">${d.teamBName}</button>
    </nav>`;
  const activeFilter = teamFilter || dayTeamFilter;

  document.getElementById('content').innerHTML = `
    ${modeToggle}
    ${teamTabs}
    <div class="card">
      <h2>Day ${idx+1} &middot; Course Setup${activeFilter ? ' &mdash; '+(d.course.name||'') : ''}</h2>
      ${activeFilter ? '' : '<div class="desc">Par and stroke index (1&ndash;18) for today\'s course. Scroll right for all 18 holes.</div>'}
      ${activeFilter ? '' : `
      <div class="settings-row">
        <label>Course name</label>
        <input type="text" id="courseName" value="${d.course.name||''}" style="max-width:220px;">
        <label style="min-width:auto;">Quick-load</label>
        <select id="courseLib" style="padding:6px 8px;border:1px solid var(--line);border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;">
          <option value="">Choose a course&hellip;</option>
          ${Object.entries(COURSE_LIBRARY).map(([key,c])=>`<option value="${key}">${c.label}</option>`).join('')}
        </select>
      </div>`}
      <div class="scroll-x">
        <table class="scorecard">
          <thead><tr><th class="name-col"></th>${holeNums.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${activeFilter ? `
              <tr><th class="name-col">Par</th>${d.course.par.map(v=>`<td>${v}</td>`).join('')}</tr>
              <tr><th class="name-col">Stroke idx</th>${d.course.si.map(v=>`<td>${v}</td>`).join('')}</tr>
            ` : `${courseRow('Par','par')}${courseRow('Stroke idx','si')}`}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Day ${idx+1} &middot; Handicaps &amp; Scorecard</h2>
      <div class="desc">Enter each player's course handicap, then gross strokes per hole. Net &amp; Stableford points calculate automatically.</div>
      <div class="settings-row" style="flex-wrap:wrap;">
        ${rowPlayers.map(p=>`<span style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:13px;">${p.name}</span>
          <input class="hcp-input" type="number" data-hcp data-player="${p.id}" value="${d.handicaps[p.id]||''}" placeholder="HCP">
        </span>`).join('')}
      </div>
      <div class="scroll-x">
        <table class="scorecard">
          <thead><tr><th class="name-col">Player</th>${holeNums.map(h=>`<th>${h}</th>`).join('')}<th>Gross</th><th>Net</th><th>Pts</th></tr></thead>
          <tbody>${rowPlayers.map(playerRow).join('')}</tbody>
        </table>
      </div>
      <div class="settings-row" style="margin-top:14px;">
        <label>Skins pot ($)</label>
        <input type="number" id="skinsPot" value="${d.skinsPot}" style="max-width:100px;">
        <span class="pill" id="skinsPill">$${perSkin}/skin (net, half hcp) &middot; ${totalSkins} skins</span>
      </div>
      <div class="skins-summary" id="skinsSummaryBox">
        ${skinHoles.length ? skinHoles.map(s=>`Hole ${s.hole}: <b>${playerName(s.winner)}</b>`).join(' &middot; ') : 'No skins yet &mdash; enter scores for at least two players.'}
      </div>
    </div>

    <div class="card">
      <h2>Day ${idx+1} &middot; Team Best Ball (2 of 4, full handicap)</h2>
      <div class="desc">Two lowest net scores per hole across the foursome, summed for 18. Lower total wins.</div>
      <div class="team-block">
        <div class="team">
          <h3>${d.teamAName}<span class="winner-badge" id="winnerBadgeA" style="display:${aWin?'inline-block':'none'};">Winner</span></h3>
          <ul>${d.teamA.map(pid=>`<li>${playerName(pid)}</li>`).join('')}</ul>
          <div class="score-row">Net best ball total: <b id="bbTotalA">${totalA===null?'&mdash;':totalA}</b></div>
        </div>
        <div class="team">
          <h3>${d.teamBName}<span class="winner-badge" id="winnerBadgeB" style="display:${bWin?'inline-block':'none'};">Winner</span></h3>
          <ul>${d.teamB.map(pid=>`<li>${playerName(pid)}</li>`).join('')}</ul>
          <div class="score-row">Net best ball total: <b id="bbTotalB">${totalB===null?'&mdash;':totalB}</b></div>
        </div>
      </div>
      <div class="settings-row">
        <label>Best ball pot ($)</label>
        <input type="number" id="bbPot" value="${d.bestBallPot}" style="max-width:100px;">
      </div>
      <div id="payoutLines">
        ${aWin ? `<div class="payout-line">Each ${d.teamAName} player collects <b>$${shareA}</b></div>` : ''}
        ${bWin ? `<div class="payout-line">Each ${d.teamBName} player collects <b>$${shareB}</b></div>` : ''}
      </div>
    </div>
    <div class="save-note" id="save-note">All entries save automatically.</div>
  `;

  const scorecardModeEl = document.getElementById('scorecardMode');
  if(scorecardModeEl) scorecardModeEl.addEventListener('change', e=>{ d.mode = e.target.checked ? 'scorecard':'quick'; saveState(); render(); });
  const courseNameEl = document.getElementById('courseName');
  if(courseNameEl) courseNameEl.addEventListener('input', e=>{ d.course.name = e.target.value; saveState(); });
  const courseLibEl = document.getElementById('courseLib');
  if(courseLibEl) courseLibEl.addEventListener('change', e=>{
    const key = e.target.value;
    if(!key) return;
    const lib = COURSE_LIBRARY[key];
    d.course.name = lib.label;
    d.course.par = lib.par.slice();
    d.course.si = lib.si.slice();
    saveState(); render();
  });
  document.querySelectorAll('[data-course]').forEach(el=>{
    el.addEventListener('change', ()=>{
      d.course[el.dataset.course][Number(el.dataset.hole)] = el.value;
      saveState(); render();
    });
  });
  document.querySelectorAll('[data-hcp]').forEach(el=>{
    el.addEventListener('change', ()=>{ d.handicaps[el.dataset.player]=el.value; saveState(); render(); });
  });
  document.querySelectorAll('[data-hole-score]').forEach(el=>{
    el.addEventListener('input', ()=>{
      d.holes[el.dataset.player][Number(el.dataset.hole)] = el.value;
      saveState();
      updateScorecardComputed(idx);
    });
  });
  document.getElementById('skinsPot').addEventListener('input', e=>{ d.skinsPot=Number(e.target.value)||0; saveState(); updateScorecardComputed(idx); });
  document.getElementById('bbPot').addEventListener('input', e=>{ d.bestBallPot=Number(e.target.value)||0; saveState(); updateScorecardComputed(idx); });
  document.querySelectorAll('#teamTabs button[data-tf]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      dayTeamFilter = btn.dataset.tf || null;
      render();
    });
  });
  document.querySelectorAll('[data-jump]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const target = document.querySelector(`[data-hole-score][data-player="${btn.dataset.jump}"][data-hole="0"]`);
      if(target){ target.focus(); target.select(); }
    });
  });
}

// Updates totals, skins, and best ball results in place — no full re-render,
// so focus and tab order stay put while entering a player's row of scores.
function updateScorecardComputed(idx){
  const d = state.days[idx];
  const {perPlayer, skinsWon, skinHoles} = computeScorecard(d, state.players);

  state.players.forEach(p=>{
    const calc = perPlayer[p.id];
    const g = document.getElementById('gross-'+p.id);
    const n = document.getElementById('net-'+p.id);
    const pts = document.getElementById('pts-'+p.id);
    if(g) g.textContent = calc.grossTotal;
    if(n) n.textContent = calc.netTotal;
    if(pts) pts.textContent = calc.ptsTotal;
  });

  const totalSkins = Object.values(skinsWon).reduce((s,v)=>s+v,0);
  const perSkin = totalSkins>0 ? (d.skinsPot/totalSkins).toFixed(2) : '0.00';
  const pill = document.getElementById('skinsPill');
  if(pill) pill.textContent = `$${perSkin}/skin (net, half hcp) \u00b7 ${totalSkins} skins`;
  const skinsBox = document.getElementById('skinsSummaryBox');
  if(skinsBox){
    skinsBox.innerHTML = skinHoles.length
      ? skinHoles.map(s=>`Hole ${s.hole}: <b>${playerName(s.winner)}</b>`).join(' &middot; ')
      : 'No skins yet &mdash; enter scores for at least two players.';
  }

  const totalA = bestBallNetTotal(d.teamA, perPlayer);
  const totalB = bestBallNetTotal(d.teamB, perPlayer);
  const aWin = totalA!==null && totalB!==null && totalA<totalB;
  const bWin = totalA!==null && totalB!==null && totalB<totalA;

  const bbA = document.getElementById('bbTotalA'); if(bbA) bbA.textContent = totalA===null?'\u2014':totalA;
  const bbB = document.getElementById('bbTotalB'); if(bbB) bbB.textContent = totalB===null?'\u2014':totalB;
  const badgeA = document.getElementById('winnerBadgeA'); if(badgeA) badgeA.style.display = aWin?'inline-block':'none';
  const badgeB = document.getElementById('winnerBadgeB'); if(badgeB) badgeB.style.display = bWin?'inline-block':'none';

  const payoutBox = document.getElementById('payoutLines');
  if(payoutBox){
    let html = '';
    if(aWin) html += `<div class="payout-line">Each ${d.teamAName} player collects <b>$${(d.bestBallPot/d.teamA.length).toFixed(2)}</b></div>`;
    if(bWin) html += `<div class="payout-line">Each ${d.teamBName} player collects <b>$${(d.bestBallPot/d.teamB.length).toFixed(2)}</b></div>`;
    payoutBox.innerHTML = html;
  }
}

function renderSettings(){
  let rows = state.players.map((p,i)=>`
    <tr>
      <td><input type="text" data-idx="${i}" value="${p.name}"></td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>Players</h2>
      <div class="desc">Rename anyone — updates everywhere, including past days.</div>
      <table><tbody>${rows}</tbody></table>
      <button class="btn ghost" id="resetBtn" style="margin-top:14px;">Reset all data</button>
    </div>
    <div class="save-note" id="save-note"></div>
  `;
  document.querySelectorAll('[data-idx]').forEach(el=>{
    el.addEventListener('input', ()=>{
      state.players[Number(el.dataset.idx)].name = el.value;
      saveState();
    });
  });
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    if(confirm('This clears every score entered for the trip. Continue?')){
      state = defaultState();
      saveState();
      render();
    }
  });
}

function render(){
  if(isGroupView){
    document.getElementById('tabs').innerHTML = '';
    renderGroupView(groupViewDay, groupViewTeam);
    return;
  }
  renderTabs();
  if(activeTab==='overall') renderOverall();
  else if(activeTab==='settings') renderSettings();
  else {
    const idx = Number(activeTab.replace('day',''));
    renderDay(idx);
  }
}

loadState();
</script>
</body>
</html>
